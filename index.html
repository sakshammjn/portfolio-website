<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0B" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Resolve theme before first paint to avoid a flash of the wrong palette.
         Dark is the intended default — the site is designed dark-first — so we
         only go light when the visitor has explicitly chosen it (via ⌘K),
         never off the OS setting. -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('theme') === 'light' ? 'light' : 'dark'
          document.documentElement.classList.add(theme)
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', theme === 'light' ? '#FAF9F5' : '#0A0A0B')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>

    <!-- Primary SEO -->
    <title>Saksham Mahajan — Software Engineer</title>
    <meta
      name="description"
      content="Saksham Mahajan is a software engineer building .NET backend services at RKIT Software, contributing to JSON Schema open source, and shipping projects from ML to Chrome extensions."
    />
    <meta
      name="keywords"
      content="Saksham Mahajan, sakshammjn, Software Engineer, .NET Developer, C#, Azure, Open Source, JSON Schema, GSoC, Portfolio"
    />
    <meta name="author" content="Saksham Mahajan" />
    <link rel="canonical" href="https://sakshammjn.com/" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="Saksham Mahajan — Writing"

    />

    <!-- Fonts. Inter / JetBrains Mono / Permanent Marker from Google Fonts;
         Clash Display (the hero face) is self-hosted — see @font-face in
         index.css and public/fonts — so it never depends on a third-party CDN. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/clash-display-700.woff2" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: Person. `sameAs` ties this site to the GitHub/LinkedIn
         profiles so Google resolves them all to one entity. Keep the URLs in
         sync with `socials` in src/data/content.ts. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "@id": "https://sakshammjn.com/#person",
        "name": "Saksham Mahajan",
        "alternateName": "sakshammjn",
        "jobTitle": "Software Engineer",
        "worksFor": {

          "name": "RKIT Software"
        },
        "url": "https://sakshammjn.com/",
        "email": "mailto:sakshammahajan2004@gmail.com",
        "sameAs": [
          "https://github.com/sakshammjn",
          "https://www.linkedin.com/in/sakshammjn/"
        ],
        "knowsAbout": [
          ".NET",
          "C#",
          "Azure",
          "REST APIs",
          "React",
          "TypeScript",
          "JSON Schema",
          "Machine Learning"
        ],
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "G H Patel College of Engineering & Technology"
        },
        "nationality": {
          "@type": "Country",
          "name": "India"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
